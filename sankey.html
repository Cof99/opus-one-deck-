<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OPUS Process — Live Mass Flow · Engebø</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15181b; --panel:#2a2f35; --panel-edge:#363c43;
    --txt:#eef1f4; --dim:#8b939c; --mut:#5c646c;
    --blue:#1f74ff; --blue-lt:#5fa0ff;
    --tab:#2d3238; --tab-edge:#3c424a; --accent:#1f74ff;
    --loss:#f0992e; --ok:#27c46f; --bad:#ff5a5f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
            font-family:Inter,system-ui,sans-serif;overflow:hidden;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{display:flex;flex-direction:column;width:100vw;height:100vh;}

  /* TOP BAR */
  #topbar{display:flex;gap:2px;height:46px;padding:6px 8px;flex-shrink:0;}
  .tab{display:flex;align-items:center;padding:0 18px;background:var(--tab);
       border:1px solid var(--tab-edge);border-radius:3px;cursor:pointer;
       font-size:15px;font-weight:600;color:var(--dim);user-select:none;min-width:150px;transition:.13s;}
  .tab .chev{margin-left:auto;padding-left:14px;color:var(--mut);font-size:11px;}
  .tab:hover{background:#343a41;color:var(--txt);}
  .tab.active{color:#fff;border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);}
  .tab.active .chev{color:#fff;}
  .spacer{flex:1;}
  .src-tab{min-width:250px;color:var(--dim);} .src-tab b{color:var(--txt);}
  .navbtn{display:flex;align-items:center;justify-content:center;width:50px;background:var(--tab);
          border:1px solid var(--tab-edge);border-radius:3px;cursor:pointer;color:var(--dim);font-size:15px;}
  .navbtn:hover{background:#343a41;color:#fff;}

  /* STAGE */
  #stage{flex:1;position:relative;min-height:0;}
  svg{position:absolute;inset:0;width:100%;height:100%;}
  .link{transition:opacity .25s;}
  .link.dim{opacity:.13;}
  .node-rect{fill:var(--panel);stroke:var(--panel-edge);stroke-width:1;}
  .node{transition:opacity .25s;} .node.dim{opacity:.3;}
  .n-title{fill:var(--dim);font-size:14px;font-weight:600;}
  .n-code{fill:var(--mut);font-size:11px;font-weight:600;}
  .n-val{fill:var(--txt);font-size:26px;font-weight:700;}
  .n-unit{fill:var(--mut);font-size:13px;}
  .n-sub{fill:var(--dim);font-size:12px;}
  .leaf-name{fill:var(--dim);font-size:15px;font-weight:600;}
  .leaf-val{fill:var(--txt);font-size:26px;font-weight:700;}
  .leaf-unit{fill:var(--mut);font-size:13px;}
  .gtrack{fill:#1d2228;stroke:#333a42;stroke-width:1;}
  .gfill{transition:width .8s cubic-bezier(.4,0,.2,1);}
  .ghandle{stroke:#cfe0ff;stroke-width:2;transition:x .8s cubic-bezier(.4,0,.2,1);}
  .leaf.dim{opacity:.3;}
  #legend{position:absolute;top:14px;right:20px;display:flex;gap:16px;background:rgba(16,20,24,.6);
          border:1px solid #2a2f35;border-radius:4px;padding:7px 13px;font-size:12px;color:var(--dim);z-index:5;}
  #legend .lg{display:flex;align-items:center;gap:7px;}
  #legend .sw{width:13px;height:8px;border-radius:2px;}
  #title-badge{position:absolute;top:12px;left:20px;z-index:5;}
  #title-badge .t1{font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:700;text-transform:uppercase;}
  #title-badge .t2{font-size:19px;font-weight:700;color:#fff;margin-top:2px;}
  #title-badge .t3{font-size:12px;color:var(--dim);}
  .tooltip{position:absolute;pointer-events:none;background:#10141a;border:1px solid #2f353c;border-radius:5px;
           padding:10px 12px;font-size:12px;color:var(--txt);box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;
           transition:opacity .12s;max-width:270px;z-index:20;}
  .tooltip b{color:#fff;}
  .tooltip .row{display:flex;justify-content:space-between;gap:18px;margin-top:3px;color:var(--dim);}
  .tooltip .row span:last-child{color:var(--txt);}

  /* BOTTOM BAR */
  #botbar{display:flex;height:62px;flex-shrink:0;border-top:1px solid #23282e;background:#13161a;}
  .b-logo{display:flex;align-items:center;justify-content:center;width:60px;font-weight:800;color:var(--accent);
          font-size:20px;border-right:1px solid #23282e;}
  .b-clock{display:flex;flex-direction:column;justify-content:center;padding:0 18px;border-right:1px solid #23282e;min-width:118px;}
  .b-clock .t{font-size:20px;font-weight:600;} .b-clock .d{font-size:11px;color:var(--mut);}
  .b-cell{display:flex;align-items:center;padding:0 16px;border-right:1px solid #23282e;color:var(--dim);font-size:13px;}
  .b-cell .v{color:var(--txt);font-weight:600;}
  .b-spacer{flex:1;}
  .b-ack{display:flex;align-items:center;padding:0 22px;border-left:1px solid #23282e;color:var(--dim);font-size:14px;font-weight:600;cursor:pointer;}
  .b-ack:hover{color:#fff;}
  .b-mute{display:flex;align-items:center;justify-content:center;width:52px;border-left:1px solid #23282e;color:var(--dim);cursor:pointer;}
  .stage-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:92px;
             border-left:1px solid #23282e;cursor:pointer;color:var(--dim);transition:.13s;}
  .stage-btn:hover{background:#1b1f24;color:#fff;}
  .stage-btn.active{background:#1b1f24;color:#fff;box-shadow:inset 0 -3px 0 var(--accent);}
  .stage-btn .ic{font-size:19px;line-height:1;} .stage-btn .lb{font-size:11px;font-weight:600;}
  .b-warn{display:flex;align-items:center;justify-content:center;width:54px;border-left:1px solid #23282e;color:var(--loss);font-size:20px;}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div class="tab active" data-view="ALL">All Flows<span class="chev">▾</span></div>
    <div class="tab" data-view="product">Products<span class="chev">▾</span></div>
    <div class="tab" data-view="garnet">Garnet Circuit<span class="chev">▾</span></div>
    <div class="tab" data-view="rutile">Rutile Circuit<span class="chev">▾</span></div>
    <div class="tab" data-view="tailings">Tailings &amp; Rejects<span class="chev">▾</span></div>
    <div class="spacer"></div>
    <div class="tab src-tab"><b>OPUS&nbsp;Process</b>&nbsp;·&nbsp;Mass&nbsp;Flow<span class="chev">▾</span></div>
    <div class="navbtn" id="nav-prev">◄</div>
    <div class="navbtn" id="nav-next">►</div>
    <div class="navbtn" id="nav-menu">☰</div>
  </div>

  <div id="stage">
    <div id="title-badge">
      <div class="t1">Nordic Mining · Engebø</div>
      <div class="t2">Process Mass Balance</div>
      <div class="t3">Current = live OPUS signals · gauge = vs digital-twin design</div>
    </div>
    <div id="legend"></div>
    <svg id="svg" viewBox="0 0 1920 1000" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="tooltip" id="tip"></div>
  </div>

  <div id="botbar">
    <div class="b-logo">Ø</div>
    <div class="b-clock"><span class="t mono" id="clock">--:--:--</span><span class="d" id="date">—</span></div>
    <div class="b-cell">Feed&nbsp;<span class="v mono" id="kpi-feed">—</span>&nbsp;tph</div>
    <div class="b-cell">Mass yield&nbsp;<span class="v mono" id="kpi-rec">—</span>&nbsp;%</div>
    <div class="b-spacer"></div>
    <div class="b-ack" id="ack">Ack</div>
    <div class="b-mute" id="mute">🔊</div>
    <div id="stagenav" style="display:flex;"></div>
    <div class="b-warn">⚠</div>
  </div>
</div>

<script>
/* =====================================================================
   OPUS Process — Live Mass-Flow Sankey  (Engebø)
   Information architecture mirrors the reference energy-flow dashboard:
     SOURCE  ->  CONVERSION  ->  CIRCUITS  ->  METERED OUTPUTS (gauges)
   Data: OPUS_Process_Sankey_Detailed_Area_Sheets.xlsx (Sankey_Data), areas 1000-5200.
   CURRENT = live OPUS signal (pollSignals → swap for real tag feed)
   DESIGN  = digital-twin / PDF reference (static)
   ===================================================================== */

const NS='http://www.w3.org/2000/svg';

// columns: 0 source · 1 conversion · 2 split · 3 circuits · 4 metered leaves
const NODES = {
  ROM : {col:0, name:'ROM Ore Feed',     code:'1000', kind:'source',  stage:'rom'},
  COM : {col:1, name:'Crushing & Milling',code:'3100/3200', kind:'proc', stage:'comm'},
  WET : {col:2, name:'Wet Plant Feed',   code:'4100', kind:'proc',    stage:'comm'},
  GAR : {col:3, name:'Garnet Circuit',   code:'4200-4400', kind:'circuit', stage:'garnet'},
  RUT : {col:3, name:'Rutile Circuit',   code:'4500', kind:'circuit', stage:'rutile'},
  // metered leaf outputs (right gauge column)
  CGP : {col:4, name:'Coarse Garnet Product', code:'4230', kind:'leaf', klass:'product'},
  FGP : {col:4, name:'Fine Garnet Product',   code:'4430', kind:'leaf', klass:'product'},
  RUP : {col:4, name:'Rutile Product',        code:'4530', kind:'leaf', klass:'product'},
  CGR : {col:4, name:'Coarse Garnet Rejects', code:'4210', kind:'leaf', klass:'loss'},
  FGR : {col:4, name:'Fine Garnet Rejects',   code:'4410', kind:'leaf', klass:'loss'},
  RUR : {col:4, name:'Rutile Rejects',        code:'4510', kind:'leaf', klass:'loss'},
  SLM : {col:4, name:'Thickened Slimes',      code:'4120', kind:'leaf', klass:'loss'},
};
// leaf vertical order (top→bottom)
const LEAF_ORDER = ['CGP','FGP','RUP','CGR','FGR','RUR','SLM'];

// LINKS — design tph (mass-balanced to 1000). cat used for highlight views.
const LINKS = [
  {s:'ROM', t:'COM', cat:'feed',    design:1000, tag:'load cells / haul trucks', desc:'Run-of-mine ore to comminution'},
  {s:'COM', t:'WET', cat:'feed',    design:1000, tag:'3210-FT/DT-036', desc:'Crushed/milled solids to wet plant'},
  {s:'WET', t:'GAR', cat:'feed',    design:820,  tag:'4110-FT/DT-029', desc:'Solids to coarse-garnet wet process'},
  {s:'WET', t:'SLM', cat:'slimes',  design:180,  tag:'4120-FT/DT-004', desc:'Thickened slimes to co-disposal'},
  {s:'GAR', t:'CGP', cat:'product', design:120,  tag:'4230-WT-092',   desc:'Coarse garnet product to silos'},
  {s:'GAR', t:'FGP', cat:'product', design:90,   tag:'4430-WT-082',   desc:'Fine garnet product to silos'},
  {s:'GAR', t:'CGR', cat:'reject',  design:220,  tag:'4210-FT/DT-043',desc:'CG gravity rejects to tailings'},
  {s:'GAR', t:'FGR', cat:'reject',  design:210,  tag:'4410/4430 rejects',desc:'FG gravity + dry rejects'},
  {s:'GAR', t:'RUT', cat:'feed',    design:180,  tag:'4320-FT/DT-042',desc:'Solids to rutile rougher circuit'},
  {s:'RUT', t:'RUP', cat:'product', design:35,   tag:'4530-WT-086',   desc:'Rutile product to silos'},
  {s:'RUT', t:'RUR', cat:'reject',  design:145,  tag:'4510/4520/4530 rejects',desc:'Rutile tails + pyrite + HTR/RER'},
];
LINKS.forEach(l=>l.current=l.design);

const STAGES=[
  {id:'rom',ic:'⛏',lb:'Feed'},{id:'comm',ic:'⚙',lb:'Comminution'},
  {id:'garnet',ic:'🔶',lb:'Garnet'},{id:'rutile',ic:'🔷',lb:'Rutile'},
  {id:'product',ic:'📦',lb:'Products'},{id:'tailings',ic:'🌊',lb:'Tailings'},
];

// ---- geometry ----
const W=1920,H=1000, COLX=[40,330,610,890,1240], NW=176, SCALE=0.30, MINH=92;
const TOP=130, BOT=70;           // vertical band for chart
const svg=document.getElementById('svg'), tip=document.getElementById('tip');
let activeView='ALL', activeStage=null;

function thru(id){
  const i=LINKS.filter(l=>l.t===id).reduce((a,l)=>a+l.current,0);
  const o=LINKS.filter(l=>l.s===id).reduce((a,l)=>a+l.current,0);
  return Math.max(i,o);
}
function designThru(id){
  const i=LINKS.filter(l=>l.t===id).reduce((a,l)=>a+l.design,0);
  const o=LINKS.filter(l=>l.s===id).reduce((a,l)=>a+l.design,0);
  return Math.max(i,o);
}

function layout(){
  const pos={};
  // box nodes (cols 0-3): height ∝ throughput, vertically centred per column
  [0,1,2,3].forEach(c=>{
    const ids=Object.keys(NODES).filter(i=>NODES[i].col===c);
    const hs=ids.map(i=>Math.max(thru(i)*SCALE,MINH));
    const tot=hs.reduce((a,b)=>a+b,0)+(ids.length-1)*30;
    let y=TOP+((H-TOP-BOT)-tot)/2;
    ids.forEach((i,k)=>{ pos[i]={x:COLX[c],y,w:NW,h:hs[k]}; y+=hs[k]+30; });
  });
  // leaf rows (col 4): evenly spaced fixed rows
  const n=LEAF_ORDER.length, band=H-TOP-BOT, pitch=band/n;
  LEAF_ORDER.forEach((id,k)=>{
    const cy=TOP+pitch*(k+0.5);
    pos[id]={x:COLX[4], cy, gw:430, isLeaf:true};
  });
  // link edge offsets
  const bySrc={},byTgt={};
  LINKS.forEach(l=>{(bySrc[l.s]=bySrc[l.s]||[]).push(l);(byTgt[l.t]=byTgt[l.t]||[]).push(l);});
  Object.keys(bySrc).forEach(s=>{
    bySrc[s].sort((a,b)=>cyOf(a.t,pos)-cyOf(b.t,pos));
    let o=0; bySrc[s].forEach(l=>{ l._sy=pos[s].y+o+l.current*SCALE/2; o+=l.current*SCALE; });
  });
  Object.keys(byTgt).forEach(t=>{
    byTgt[t].sort((a,b)=>cyOf(a.s,pos)-cyOf(b.s,pos));
    if(pos[t].isLeaf){ byTgt[t].forEach(l=> l._ty=pos[t].cy ); }
    else { let o=0; byTgt[t].forEach(l=>{ l._ty=pos[t].y+o+l.current*SCALE/2; o+=l.current*SCALE; }); }
  });
  return pos;
}
function cyOf(id,pos){ const p=pos[id]; return p.isLeaf?p.cy:p.y+p.h/2; }

function ribbon(l,pos){
  const a=pos[l.s], b=pos[l.t];
  const x0=a.x+a.w, x1=b.isLeaf?b.x:b.x;
  const w=Math.max(l.current*SCALE,2.5), y0=l._sy, y1=l._ty, cx=(x0+x1)/2;
  return `M${x0},${y0-w/2} C${cx},${y0-w/2} ${cx},${y1-w/2} ${x1},${y1-w/2}`+
         `L${x1},${y1+w/2} C${cx},${y1+w/2} ${cx},${y0+w/2} ${x0},${y0+w/2} Z`;
}

function el(t,a){const e=document.createElementNS(NS,t);if(a)for(const k in a)e.setAttribute(k,a[k]);return e;}
function txt(x,y,s,cls,a){const e=el('text',Object.assign({x,y,class:cls},a||{}));e.textContent=s;return e;}
function fmt(v){return Math.round(v).toLocaleString('en-US');}
function devCol(d){return Math.abs(d)<3?'#27c46f':Math.abs(d)<8?'#f0992e':'#ff5a5f';}

function build(){
  const pos=layout(); svg.innerHTML='';
  const defs=el('defs');
  const g=el('linearGradient',{id:'flow',x1:'0',x2:'1',y1:'0',y2:'0'});
  g.appendChild(el('stop',{offset:'0%','stop-color':'#1f74ff','stop-opacity':'.45'}));
  g.appendChild(el('stop',{offset:'100%','stop-color':'#5fa0ff','stop-opacity':'.75'}));
  defs.appendChild(g); svg.appendChild(defs);

  const gl=el('g'); svg.appendChild(gl);
  LINKS.forEach(l=>{
    const p=el('path',{d:ribbon(l,pos),fill:'url(#flow)',class:'link'});
    p.addEventListener('mousemove',e=>showTip(e,linkTip(l)));
    p.addEventListener('mouseleave',hideTip);
    l._el=p; gl.appendChild(p);
  });

  const gn=el('g'); svg.appendChild(gn);
  Object.keys(NODES).forEach(id=>{
    const n=NODES[id], p=pos[id];
    if(p.isLeaf){ buildLeaf(gn,id,n,p); return; }
    const grp=el('g',{class:'node'}); grp.dataset.id=id; grp.dataset.stage=n.stage;
    grp.appendChild(el('rect',{x:p.x,y:p.y,width:p.w,height:p.h,rx:4,class:'node-rect'}));
    grp.appendChild(el('rect',{x:p.x,y:p.y,width:4,height:p.h,fill:'#1f74ff'}));
    grp.appendChild(txt(p.x+16,p.y+26,n.name,'n-title'));
    const cur=thru(id);
    const vy=p.y+62;
    const vt=txt(p.x+16,vy,fmt(cur),'n-val mono'); grp.appendChild(vt);
    grp.appendChild(txt(p.x+16+fmt(cur).length*16+8,vy,'tph','n-unit'));
    grp.appendChild(txt(p.x+16,vy+20,'design '+fmt(designThru(id))+' · '+n.code,'n-sub'));
    grp.addEventListener('mousemove',e=>showTip(e,nodeTip(id)));
    grp.addEventListener('mouseleave',hideTip);
    n._el=grp; n._vt=vt; gn.appendChild(grp);
  });
  applyView();
}

function buildLeaf(parent,id,n,p){
  const grp=el('g',{class:'leaf'}); grp.dataset.id=id; grp.dataset.stage=(n.klass==='product'?'product':'tailings');
  const x=p.x, gw=p.gw, barY=p.cy+4, nameY=p.cy-12;
  const accent = n.klass==='product' ? '#1f74ff' : '#f0992e';
  // dot + name
  grp.appendChild(el('circle',{cx:x+5,cy:nameY-4,r:4,fill:accent}));
  grp.appendChild(txt(x+18,nameY,n.name,'leaf-name'));
  // gauge track + fill + handle
  grp.appendChild(el('rect',{x:x,y:barY,width:gw,height:10,rx:5,class:'gtrack'}));
  const cur=thru(id), dz=designThru(id), ratio=Math.max(.04,Math.min(1.1,cur/dz));
  const fw=gw*Math.min(ratio,1);
  const gf=el('rect',{x:x,y:barY,width:fw,height:10,rx:5,fill:accent,class:'gfill','fill-opacity':'.85'});
  grp.appendChild(gf);
  const hd=el('rect',{x:x+fw-1.5,y:barY-3,width:3,height:16,rx:1,fill:'#cfe0ff',class:'ghandle'});
  grp.appendChild(hd);
  // value
  const vx=x+gw+24;
  const vt=txt(vx,p.cy+8,fmt(cur),'leaf-val mono'); grp.appendChild(vt);
  grp.appendChild(txt(vx+fmt(cur).length*16+6,p.cy+8,'tph','leaf-unit'));
  grp.addEventListener('mousemove',e=>showTip(e,nodeTip(id)));
  grp.addEventListener('mouseleave',hideTip);
  n._el=grp; n._vt=vt; n._gf=gf; n._hd=hd; n._gw=gw; n._x=x; parent.appendChild(grp);
}

// ---- highlight views ----
function linkOn(l){
  if(activeView==='ALL' && !activeStage) return true;
  let on=true;
  if(activeView!=='ALL'){
    if(activeView==='product') on = l.cat==='product';
    else if(activeView==='tailings') on = (l.cat==='reject'||l.cat==='slimes');
    else if(activeView==='garnet') on = (l.s==='GAR'||l.t==='GAR'||l.s==='ROM'||l.s==='COM'||l.s==='WET'&&l.t==='GAR');
    else if(activeView==='rutile') on = (l.s==='RUT'||l.t==='RUT');
  }
  if(activeStage){
    const sStg=NODES[l.s].stage, tStg=NODES[l.t].stage||(NODES[l.t].klass==='product'?'product':'tailings');
    on = on && (sStg===activeStage||tStg===activeStage);
  }
  return on;
}
function applyView(){
  LINKS.forEach(l=> l._el.classList.toggle('dim', !linkOn(l)) );
  Object.keys(NODES).forEach(id=>{
    const n=NODES[id]; let on=true;
    const stg=n.stage||(n.klass==='product'?'product':'tailings');
    if(activeStage) on = (stg===activeStage);
    if(activeView==='product') on = on && (n.kind!=='leaf'||n.klass==='product');
    if(activeView==='tailings') on = on && (n.kind!=='leaf'||n.klass==='loss');
    n._el.classList.toggle('dim', (activeView!=='ALL'||activeStage)? !on : false);
  });
}

// ---- tooltips ----
function linkTip(l){
  const dev=(l.current-l.design)/l.design*100;
  return `<b>${NODES[l.s].name} → ${NODES[l.t].name}</b>
   <div class="row"><span>${l.desc}</span></div>
   <div class="row"><span>Current</span><span class="mono">${fmt(l.current)} tph</span></div>
   <div class="row"><span>Design</span><span class="mono">${fmt(l.design)} tph</span></div>
   <div class="row"><span>Deviation</span><span class="mono" style="color:${devCol(dev)}">${dev>0?'+':''}${dev.toFixed(1)}%</span></div>
   <div class="row"><span>Tag</span><span class="mono">${l.tag}</span></div>`;
}
function nodeTip(id){
  const n=NODES[id], cur=thru(id), dz=designThru(id), dev=(cur-dz)/dz*100;
  return `<b>${n.code} — ${n.name}</b>
   <div class="row"><span>Current</span><span class="mono">${fmt(cur)} tph</span></div>
   <div class="row"><span>Design</span><span class="mono">${fmt(dz)} tph</span></div>
   <div class="row"><span>Deviation</span><span class="mono" style="color:${devCol(dev)}">${dev>0?'+':''}${dev.toFixed(1)}%</span></div>`;
}
function showTip(e,html){
  tip.innerHTML=html; tip.style.opacity='1';
  const r=document.getElementById('stage').getBoundingClientRect();
  let x=e.clientX-r.left+14,y=e.clientY-r.top+14;
  if(x+280>r.width)x=e.clientX-r.left-280;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip(){tip.style.opacity='0';}

// ---- live signal sim (replace with real OPUS feed) ----
function pollSignals(){
  LINKS.forEach(l=>{
    const d=l.design, noise=(Math.random()-0.5)*0.03*d;
    l.current += noise + (d-l.current)*0.18;
    l.current = Math.max(d*0.86, Math.min(d*1.10, l.current));
  });
}
function refresh(){
  const pos=layout();
  LINKS.forEach(l=> l._el.setAttribute('d', ribbon(l,pos)) );
  Object.keys(NODES).forEach(id=>{
    const n=NODES[id], cur=thru(id);
    if(n._vt) n._vt.textContent=fmt(cur);
    if(n._gf){
      const dz=designThru(id), ratio=Math.max(.04,Math.min(1.1,cur/dz)), fw=n._gw*Math.min(ratio,1);
      n._gf.setAttribute('width',fw); n._hd.setAttribute('x',n._x+fw-1.5);
    }
  });
  const feed=LINKS.find(l=>l.s==='ROM').current;
  const prod=LINKS.filter(l=>l.cat==='product').reduce((a,l)=>a+l.current,0);
  document.getElementById('kpi-feed').textContent=fmt(feed);
  document.getElementById('kpi-rec').textContent=(prod/feed*100).toFixed(1);
}

// ---- UI wiring ----
document.querySelectorAll('.tab[data-view]').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab[data-view]').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); activeView=t.dataset.view; applyView();
}));
const lg=document.getElementById('legend');
[['#1f74ff','Process / product flow'],['#f0992e','Tailings / rejects']].forEach(([c,t])=>{
  const d=document.createElement('div'); d.className='lg';
  d.innerHTML=`<span class="sw" style="background:${c}"></span>${t}`; lg.appendChild(d);
});
const sn=document.getElementById('stagenav');
STAGES.forEach(s=>{
  const b=document.createElement('div'); b.className='stage-btn'; b.dataset.stage=s.id;
  b.innerHTML=`<span class="ic">${s.ic}</span><span class="lb">${s.lb}</span>`;
  b.addEventListener('click',()=>{
    const was=b.classList.contains('active');
    document.querySelectorAll('.stage-btn').forEach(x=>x.classList.remove('active'));
    activeStage = was?null:s.id; if(!was)b.classList.add('active'); applyView();
  });
  sn.appendChild(b);
});
document.getElementById('nav-menu').addEventListener('click',()=>{
  activeView='ALL'; activeStage=null;
  document.querySelectorAll('.tab[data-view]').forEach(x=>x.classList.toggle('active',x.dataset.view==='ALL'));
  document.querySelectorAll('.stage-btn').forEach(x=>x.classList.remove('active'));
  applyView();
});
let muted=false;
document.getElementById('mute').addEventListener('click',function(){muted=!muted;this.textContent=muted?'🔇':'🔊';});
document.getElementById('ack').addEventListener('click',function(){this.style.color='#27c46f';setTimeout(()=>this.style.color='',600);});

function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=d.toLocaleTimeString('en-GB');
  document.getElementById('date').textContent=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

build(); tick(); refresh();
setInterval(tick,1000);
setInterval(()=>{pollSignals();refresh();},2000);
</script>
